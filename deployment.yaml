---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: deploy1
    namespace: balaji
    annotations:
        description: This is my first deployment
        kubernetes.io/change-cause: "http to nginx"
spec:
    replicas: 3
    selector:
        matchLabels:
            app: mydep
    template:
        metadata:
            labels:
                app: mydep
        spec:
            containers:
                - name: c1
                  image: balajippai/task-nginx:83c84751dd141b5d23965874d2105bb6563adcf0
